# Azure DevOps Pipeline: Microsoft Roadmap Sync
# Runs on a schedule to fetch Azure/M365 roadmap RSS feeds,
# filter by product/status, and create work items for new items.

trigger: none  # Manual or scheduled only

schedules:
  - cron: "0 7 * * 1-5"        # 07:00 UTC, Monday–Friday
    displayName: "Daily Roadmap Sync"
    branches:
      include:
        - main
    always: true                 # Run even if no code changes

pool:
  vmImage: "windows-latest"

parameters:
  - name: daysBack
    displayName: "Days back to check"
    type: number
    default: 7

  - name: dryRun
    displayName: "Dry run (no work items created)"
    type: boolean
    default: false

variables:
  - name: ADO_ORGANIZATION
    value: $(System.CollectionUri)

steps:
  - checkout: self

  - task: PowerShell@2
    displayName: "Run Roadmap Sync"
    inputs:
      filePath: "$(Build.SourcesDirectory)/Sync-RoadmapItems.ps1"
      arguments: >-
        -ConfigPath "$(Build.SourcesDirectory)/roadmap-filter.json"
        -DaysBack ${{ parameters.daysBack }}
        -Organization "$(ADO_ORGANIZATION)"
        $(if ('${{ parameters.dryRun }}' -eq 'True') { '-DryRun' })
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
